<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bild-Assoziation: Russische Grammatik</title>
    <!-- Polyfill für Drag-and-Drop auf Touch-Geräten -->
    <script src="https://cdn.jsdelivr.net/npm/drag-drop-touch@1.3.1/DragDropTouch.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --vsegda-bg: #e3f2fd;
            --vsegda-border: #3498db;
            --navsegda-bg: #f3e5f5;
            --navsegda-border: #9b59b6;
            --success: #27ae60;
            --error: #e74c3c;
            --bg: #f4f7f6;
        }

        /* Deaktiviert Kursivschrift im gesamten Dokument */
        * {
            font-style: normal !important;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            line-height: 1.6;
            margin: 0;
            padding: 10px;
        }

        .container {
            max-width: 900px;
            margin: 20px auto;
            background: #ffffff;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            border-bottom: 3px solid var(--primary);
            padding-bottom: 10px;
            margin-bottom: 25px;
        }

        .instruction {
            background-color: #e8f4fd;
            padding: 15px;
            border-left: 5px solid var(--accent);
            border-radius: 5px;
            margin-bottom: 30px;
            text-align: center;
        }

        .zones-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .drop-zone {
            border: 3px dashed #cbd5e0;
            border-radius: 15px;
            padding: 20px;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.3s ease;
        }

        .zone-v { background-color: var(--vsegda-bg); border-color: var(--vsegda-border); }
        .zone-n { background-color: var(--navsegda-bg); border-color: var(--navsegda-border); }

        .drop-zone.drag-over {
            background-color: #fff;
            border-style: solid;
            transform: scale(1.01);
        }

        .symbol {
            width: 70px;
            height: 70px;
            margin-bottom: 10px;
            pointer-events: none;
            opacity: 0.8;
        }

        .zone-title {
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .item-pool {
            background-color: #f8fafc;
            padding: 20px;
            border-radius: 12px;
            min-height: 120px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            border: 2px solid #e2e8f0;
        }

        .draggable-card {
            background-color: #fff;
            padding: 12px 18px;
            border-radius: 8px;
            cursor: grab;
            border: 2px solid #cbd5e0;
            font-weight: 600;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.2s ease;
            max-width: 280px;
            text-align: center;
            user-select: none;
        }

        .draggable-card:active {
            cursor: grabbing;
        }

        /* Feedback Status */
        .card-correct { 
            background-color: var(--success) !important; 
            color: #fff !important; 
            border-color: var(--success) !important; 
        }
        .card-incorrect { 
            background-color: var(--error) !important; 
            color: #fff !important; 
            border-color: var(--error) !important; 
        }

        .controls {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: opacity 0.2s;
        }

        .btn-reset { background-color: #718096; color: white; }
        .btn-sol { background-color: var(--accent); color: white; }
        .btn:hover { opacity: 0.9; }

        @media (max-width: 700px) {
            .zones-container { grid-template-columns: 1fr; }
            .drop-zone { min-height: 220px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Bild-Wort-Assoziation</h1>

    <div class="instruction">
        Ordne die Sätze dem passenden Symbol zu. <br>
        <strong>Uhr (Zyklus)</strong> = ВСЕГДА | <strong>Flugzeug (One-Way)</strong> = НАВСЕГДА
    </div>

    <div class="zones-container">
        <!-- Zone ВСЕГДА -->
        <div class="drop-zone zone-v" id="zone-v" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">
            <svg class="symbol" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10" />
                <path d="M12 6v6l4 2" />
            </svg>
            <div class="zone-title">ВСЕГДА</div>
        </div>

        <!-- Zone НАВСЕГДА -->
        <div class="drop-zone zone-n" id="zone-n" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">
            <svg class="symbol" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17.8 19.2L16 11l3.5-3.5C21 6 22.5 5 22.5 5s-1 1.5-2.5 3L16.5 11.5 7.5 7 4 8l3.5 3.5L3 16l4 1 3.5-3.5 8.2 5.7z" />
                <path d="M3 21h18" stroke-dasharray="4 4" />
            </svg>
            <div class="zone-title">НАВСЕГДА</div>
        </div>
    </div>

    <div class="item-pool" id="pool" ondrop="drop(event)" ondragover="allowDrop(event)">
        <!-- Karten werden dynamisch erzeugt -->
    </div>

    <div class="controls">
        <button class="btn btn-reset" onclick="resetAll()">Zurücksetzen</button>
        <button class="btn btn-sol" onclick="showSolutions()">Lösungen anzeigen</button>
    </div>
</div>

<script>
    const taskData = [
        { id: "c1", text: "Я всегда пью чай без сахара.", cat: "v" },
        { id: "c2", text: "Мы решили расстаться навсегда.", cat: "n" },
        { id: "c3", text: "Юля всегда опаздывала в школу.", cat: "v" },
        { id: "c4", text: "Я запомню этот день навсегда.", cat: "n" },
        { id: "c5", text: "Солнце всегда встаёт на востоке.", cat: "v" },
        { id: "c6", text: "Он уехал из страны навсегда.", cat: "n" },
        { id: "c7", text: "Коллеги всегда помогают мне.", cat: "v" },
        { id: "c8", text: "Я навсегда бросил курить.", cat: "n" },
        { id: "c9", text: "Друзья всегда приходят вовремя.", cat: "v" },
        { id: "c10", text: "Мы попрощались навсегда.", cat: "n" }
    ];

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function initPool() {
        const pool = document.getElementById('pool');
        pool.innerHTML = '';
        const shuffledData = shuffle([...taskData]);
        
        shuffledData.forEach(item => {
            const card = document.createElement('div');
            card.className = 'draggable-card';
            card.id = item.id;
            card.draggable = true;
            card.innerText = item.text;
            card.dataset.cat = item.cat;
            card.addEventListener('dragstart', dragStart);
            pool.appendChild(card);
        });
    }

    function dragStart(ev) {
        ev.dataTransfer.setData("text/plain", ev.target.id);
    }

    function allowDrop(ev) {
        ev.preventDefault();
        const zone = ev.target.closest('.drop-zone') || ev.target.closest('.item-pool');
        if (zone) zone.classList.add('drag-over');
    }

    function dragLeave(ev) {
        const zone = ev.target.closest('.drop-zone') || ev.target.closest('.item-pool');
        if (zone) zone.classList.remove('drag-over');
    }

    function drop(ev) {
        ev.preventDefault();
        const id = ev.dataTransfer.getData("text/plain");
        const card = document.getElementById(id);
        const target = ev.target.closest('.drop-zone') || ev.target.closest('.item-pool');

        if (target && card) {
            target.classList.remove('drag-over');
            target.appendChild(card);

            // Feedback-Logik
            card.classList.remove('card-correct', 'card-incorrect');
            
            if (target.id === 'zone-v') {
                card.classList.add(card.dataset.cat === 'v' ? 'card-correct' : 'card-incorrect');
            } else if (target.id === 'zone-n') {
                card.classList.add(card.dataset.cat === 'n' ? 'card-correct' : 'card-incorrect');
            }
        }
    }

    function resetAll() {
        const pool = document.getElementById('pool');
        const cards = document.querySelectorAll('.draggable-card');
        
        // Karten zurück in den Pool und Klassen entfernen
        cards.forEach(card => {
            card.classList.remove('card-correct', 'incorrect', 'card-incorrect');
            pool.appendChild(card);
        });

        // Im Pool neu mischen
        const cardsArray = Array.from(pool.children);
        shuffle(cardsArray).forEach(card => pool.appendChild(card));

        // Zonen-Highlights entfernen (Sicherheitshalber)
        document.getElementById('zone-v').classList.remove('drag-over');
        document.getElementById('zone-n').classList.remove('drag-over');
    }

    function showSolutions() {
        const zoneV = document.getElementById('zone-v');
        const zoneN = document.getElementById('zone-n');
        const cards = document.querySelectorAll('.draggable-card');

        cards.forEach(card => {
            card.classList.remove('card-incorrect');
            card.classList.add('card-correct');
            if (card.dataset.cat === 'v') {
                zoneV.appendChild(card);
            } else {
                zoneN.appendChild(card);
            }
        });
    }

    // Initialisierung
    window.onload = initPool;
</script>

</body>
</html>
