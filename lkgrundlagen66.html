<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vokabel-Trainer: ВСЕГДА vs. НАВСЕГДА</title>
    <style>
        :root {
            --primary-green: #27ae60;
            --light-green: #2ecc71;
            --dark-green: #1e8449;
            --bg-color: #f1f8f4;
            --card-white: #ffffff;
            --text-dark: #2c3e50;
            --shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            text-align: center;
        }

        h1 {
            color: var(--dark-green);
            margin-bottom: 10px;
            font-size: 1.5rem;
        }

        .progress {
            font-weight: bold;
            color: var(--primary-green);
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        /* Flashcard 3D Effekt */
        .card-container {
            perspective: 1000px;
            width: 100%;
            height: 300px;
            margin: 0 auto 30px auto;
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            box-shadow: var(--shadow);
            border-radius: 15px;
        }

        .card-container.is-flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            border-radius: 15px;
            background: var(--card-white);
            border: 2px solid var(--primary-green);
        }

        .card-back {
            transform: rotateY(180deg);
            background-color: #f9fdfa;
        }

        .vocab-text {
            font-size: 2rem;
            font-weight: bold;
            word-wrap: break-word;
            max-width: 100%;
        }

        .vocab-translation {
            font-size: 1.8rem;
            color: var(--dark-green);
        }

        .hint {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #7f8c8d;
            font-style: italic;
        }

        /* Navigation & Buttons */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .btn {
            background-color: var(--primary-green);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .btn:hover {
            background-color: var(--dark-green);
        }

        .btn:active {
            transform: translateY(2px);
        }

        .btn-secondary {
            background-color: #ecf0f1;
            color: var(--text-dark);
        }

        .btn-secondary:hover {
            background-color: #d5dbdb;
        }

        .full-width {
            grid-column: span 2;
        }

        .keyboard-hint {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #95a5a6;
        }

        @media (max-width: 480px) {
            .vocab-text { font-size: 1.5rem; }
            .vocab-translation { font-size: 1.4rem; }
            .card-container { height: 250px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Russisch-Lernkartei</h1>
    <div class="progress" id="progressText">1 / 50</div>

    <div class="card-container" id="cardContainer" onclick="flipCard()">
        <div class="card-inner" id="cardInner">
            <div class="card-front">
                <div class="vocab-text" id="frontText">всегда́</div>
                <div class="hint">Russisch</div>
            </div>
            <div class="card-back">
                <div class="vocab-translation" id="backText">immer</div>
                <div class="hint">Deutsch</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn" onclick="prevCard()">← Vorherige</button>
        <button class="btn" onclick="nextCard()">Nächste →</button>
        <button class="btn btn-secondary" onclick="shuffleDeck()">🔀 Mischen</button>
        <button class="btn btn-secondary" onclick="goToStart()">🏠 An den Anfang</button>
    </div>

    <div class="keyboard-hint">
        Tastatur: Pfeiltasten für Navigation | Leertaste/Enter zum Umdrehen | Pos1 für Anfang
    </div>
</div>

<script>
    // Vokabeldaten
    const originalVocab = [
        {f: "всегда́", b: "immer"},
        {f: "навсегда́", b: "für immer"},
        {f: "опа́здывать / опозда́ть", b: "zu spät kommen"},
        {f: "расстава́ться / расста́ться", b: "sich trennen"},
        {f: "запомина́ть / запо́мнить", b: "sich merken / behalten"},
        {f: "уезжа́ть / уе́хать", b: "wegfahren / verlassen / verreisen"},
        {f: "помога́ть / помо́чь", b: "helfen"},
        {f: "забыва́ть / забы́ть", b: "vergessen"},
        {f: "броса́ть / бро́сить", b: "werfen / verlassen / aufhören (z. B. Rauchen)"},
        {f: "проща́ться / попроща́ться", b: "sich verabschieden"},
        {f: "встава́ть / встать", b: "aufstehen / (Sonne) aufgehen"},
        {f: "реша́ть / реши́ть", b: "entscheiden / lösen"},
        {f: "покупа́ть / купи́ть", b: "kaufen"},
        {f: "де́лать / сде́лать", b: "machen / tun"},
        {f: "пра́здновать / отпра́здновать", b: "feiern"},
        {f: "люби́ть / полюби́ть", b: "lieben / lieb gewinnen"},
        {f: "говори́ть / сказа́ть", b: "sprechen / sagen"},
        {f: "рабо́тать / порабо́тать", b: "arbeiten"},
        {f: "зака́зывать / заказа́ть", b: "bestellen"},
        {f: "закрыва́ть / закры́ть", b: "schließen / (ein Thema) beenden"},
        {f: "покида́ть / поки́нуть", b: "verlassen"},
        {f: "изменя́ть / измени́ть", b: "ändern / verändern"},
        {f: "шко́ла", b: "Schule"},
        {f: "аэропо́рт", b: "Flughafen"},
        {f: "го́род", b: "Stadt"},
        {f: "страна́", b: "Land"},
        {f: "компа́ния", b: "Firma / Gesellschaft"},
        {f: "колле́га", b: "Kollege / Kollegin"},
        {f: "друг / подру́га", b: "Freund / Freundin"},
        {f: "сло́во", b: "Wort"},
        {f: "сове́т", b: "Rat / Ratschlag"},
        {f: "востόк", b: "Osten"},
        {f: "па́мять", b: "Gedächtnis / Erinnerung"},
        {f: "жизнь", b: "Leben"},
        {f: "моме́нт", b: "Moment"},
        {f: "реше́ние", b: "Entscheidung / Lösung"},
        {f: "пра́вда", b: "Wahrheit"},
        {f: "у́тро", b: "Morgen"},
        {f: "понеде́льник", b: "Montag"},
        {f: "ча́сто", b: "oft"},
        {f: "обы́чно", b: "gewöhnlich / normalerweise"},
        {f: "постоя́нно", b: "ständig / dauernd"},
        {f: "ра́ньше", b: "früher"},
        {f: "тепе́рь", b: "jetzt / nun"},
        {f: "за́ранее", b: "im Voraus / vorzeitig"},
        {f: "оконча́тельно", b: "endgültig"},
        {f: "ка́ждый", b: "jeder / jede / jedes"},
        {f: "постоя́нный", b: "ständig / beständig / permanent"},
        {f: "прекра́сный", b: "wunderschön / herrlich"},
        {f: "ве́чный", b: "ewig"}
    ];

    let currentDeck = [...originalVocab];
    let currentIndex = 0;
    const cardContainer = document.getElementById('cardContainer');
    const frontText = document.getElementById('frontText');
    const backText = document.getElementById('backText');
    const progressText = document.getElementById('progressText');

    // Karte aktualisieren
    function updateCard() {
        const card = currentDeck[currentIndex];
        
        // Flip-Zustand zurücksetzen vor Textänderung
        cardContainer.classList.remove('is-flipped');
        
        // Kurze Verzögerung für den Textwechsel, damit man ihn nicht während des Drehens sieht
        setTimeout(() => {
            frontText.innerText = card.f;
            backText.innerText = card.b;
            adjustFontSize(frontText, card.f);
            adjustFontSize(backText, card.b);
            progressText.innerText = `${currentIndex + 1} / ${currentDeck.length}`;
        }, 150);
    }

    // Schriftgröße anpassen um Überlauf zu verhindern
    function adjustFontSize(element, text) {
        if (text.length > 30) {
            element.style.fontSize = "1.2rem";
        } else if (text.length > 20) {
            element.style.fontSize = "1.5rem";
        } else {
            element.style.fontSize = "2rem";
        }
    }

    // Funktionen für Interaktion
    function flipCard() {
        cardContainer.classList.toggle('is-flipped');
    }

    function nextCard() {
        if (currentIndex < currentDeck.length - 1) {
            currentIndex++;
            updateCard();
        }
    }

    function prevCard() {
        if (currentIndex > 0) {
            currentIndex--;
            updateCard();
        }
    }

    function goToStart() {
        currentIndex = 0;
        updateCard();
    }

    function shuffleDeck() {
        // Fisher-Yates Shuffle
        for (let i = currentDeck.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [currentDeck[i], currentDeck[j]] = [currentDeck[j], currentDeck[i]];
        }
        currentIndex = 0;
        updateCard();
    }

    // Tastatursteuerung
    document.addEventListener('keydown', (e) => {
        switch(e.key) {
            case 'ArrowLeft':
                prevCard();
                break;
            case 'ArrowRight':
                nextCard();
                break;
            case ' ':
            case 'Enter':
                e.preventDefault(); // Verhindert Scrollen bei Leertaste
                flipCard();
                break;
            case 'Home':
                goToStart();
                break;
        }
    });

    // Initialisierung
    updateCard();
</script>

</body>
</html>
